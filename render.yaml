services:
  - type: web
    name: n8n
    env: docker
    plan: free
    branch: master
    dockerfilePath: ./Dockerfile
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: ton
      - key: N8N_BASIC_AUTH_PASSWORD
        value: 123ton123
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: "5678"
      - key: WEBHOOK_URL
        value: https://n8n-nxzy.onrender.com
      - key: N8N_EDITOR_BASE_URL
        value: https://n8n-nxzy.onrender.com
      - key: N8N_PROTOCOL
        value: https
  
